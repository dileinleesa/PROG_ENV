<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <script src="js/index.js"></script>
  <title>PROG_ENV. A</title>
</head>
<body>
	<h1>PROG_ENV. A</h1>
	<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PROG_ENV - Welcome</title>
  <style>
    :root {
      --neon: #00f3ff;
      --purple: #c300ff;
      --bg: #0a0a1f;
      --card: rgba(17,17,35,0.92);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    canvas#matrix {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.7;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 30px 24px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid rgba(0,243,255,0.25);
      box-shadow: 0 0 60px rgba(0,243,255,0.18);
      text-align: center;
    }

    .logo {
      width: 180px;
      margin: 0 auto 30px;
      filter: drop-shadow(0 0 25px var(--neon));
    }

    h1 {
      font-size: 2.1rem;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #a0a0ff;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: #ccc;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #111122;
      border: 1px solid #333355;
      border-radius: 10px;
      color: white;
      font-size: 1.05rem;
    }

    input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,243,255,0.2);
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 12px 0 8px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      color: black;
      font-weight: bold;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,243,255,0.4);
    }

    .toggle-link {
      color: #88aaff;
      text-decoration: none;
      font-size: 0.95rem;
      margin-top: 16px;
      display: inline-block;
    }

    .toggle-link:hover {
      color: var(--neon);
      text-decoration: underline;
    }

    .hidden { display: none !important; }

    .demo-note {
      margin-top: 40px;
      font-size: 0.82rem;
      color: #777799;
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
  <img src="logo.png" alt="PROG_ENV" class="logo">

  <h1>Welcome to PROG_ENV</h1>
  <p class="subtitle">Sign in to start coding</p>

  <!-- ─── SIGN IN ─────────────────────────────────────── -->
  <form id="signin-form" onsubmit="handleSignIn(event)">
    <div class="form-group">
      <label>Username / Email</label>
      <input type="text" id="username" placeholder="admin or your name" required autofocus>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn">Sign In</button>
  </form>

  <!-- Sign Up is hidden by default -->
  <div id="signup-section" class="hidden">
    <form id="signup-form" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label>Choose Username</label>
        <input type="text" id="new-username" placeholder="your coding name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="new-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="new-password" placeholder="strong password" required>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
  </div>

  <a href="#" class="toggle-link" id="show-signup">Need an account? Sign up</a>
  <a href="#" class="toggle-link hidden" id="show-signin">Already have an account? Sign in</a>

  <div class="demo-note">
    Admin cheat: username <strong>admin</strong> • password <strong>leesa2025</strong>
  </div>
</div>

<script>
// ─── MATRIX BACKGROUND ───────────────────────────────────────
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const chars = '01<>//{}[]()=+-*&#@!?%PROG_ENVABCDEFGHIJKLMNOPQRSTUVWXYZ';
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = new Array(columns).fill(1);

function draw() {
  ctx.fillStyle = 'rgba(10,10,31,0.06)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#00f3ff';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    const x = i * fontSize;
    ctx.fillText(text, x, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 40);

// ─── SIMPLE DB (localStorage) ────────────────────────────────
function getUsers() {
  return JSON.parse(localStorage.getItem('prog_env_users') || '[]');
}

function saveUsers(users) {
  localStorage.setItem('prog_env_users', JSON.stringify(users));
}

// Seed admin if not exists
if (!getUsers().some(u => u.username === 'admin')) {
  const users = getUsers();
  users.push({
    username: 'Dilein',
    email: 'dileinleesa',
    password: 'leesa2026',          // ← change this if you want
    role: 'admin',
    xp: 15000,
    badges: ['🔥','🏆','👑']
  });
  saveUsers(users);
}

// ─── SIGN IN LOGIC ───────────────────────────────────────────
function handleSignIn(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const users = getUsers();
  const user = users.find(u => 
    (u.username.toLowerCase() === username.toLowerCase() || u.email === username) 
    && u.password === password
  );

  if (user) {
    localStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'dashboard.html';
  } else {
    alert('Wrong username or password.\n\nAdmin hint: admin / leesa2025');
  }
}

// ─── SIGN UP (hidden but still functional) ───────────────────
function handleSignUp(e) {
  e.preventDefault();

  const username = document.getElementById('new-username').value.trim();
  const email    = document.getElementById('new-email').value.trim();
  const password = document.getElementById('new-password').value;

  if (password.length < 5) return alert('Password too short');

  let users = getUsers();
  if (users.some(u => u.username === username || u.email === email)) {
    return alert('Username or email already taken');
  }

  const newUser = {
    username,
    email,
    password,
    role: 'user',
    xp: 0,
    badges: ['🌱']
  };

  users.push(newUser);
  saveUsers(users);

  localStorage.setItem('currentUser', JSON.stringify(newUser));
  alert('Account created! Welcome.');
  window.location.href = 'dashboard.html';
}

// ─── TOGGLE SIGN UP / SIGN IN ────────────────────────────────
document.getElementById('show-signup').onclick = function(e) {
  e.preventDefault();
  document.getElementById('signin-form').classList.add('hidden');
  document.getElementById('signup-section').classList.remove('hidden');
  this.classList.add('hidden');
  document.getElementById('show-signin').classList.remove('hidden');
};

document.getElementById('show-signin').onclick = function(e) {
  e.preventDefault();
  document.getElementById('signup-section').classList.add('hidden');
  document.getElementById('signin-form').classList.remove('hidden');
  this.classList.add('hidden');
  document.getElementById('show-signup').classList.remove('hidden');
};
</script>
</body>
</html>
